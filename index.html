<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Maker — Word by Word 9:16</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0f0f; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; padding-bottom:40px; }

.panel { width:100%; max-width:680px; background:#1a1a1a; border-bottom:1px solid #2a2a2a; padding:10px 14px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.ptitle { width:100%; font-size:10px; color:#e63946; font-weight:bold; letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; }
label { color:#bbb; font-size:12px; display:flex; align-items:center; gap:4px; }
select, input[type=text] { background:#252525; color:#fff; border:1px solid #3a3a3a; padding:4px 8px; border-radius:4px; font-size:12px; }
textarea { background:#252525; color:#fff; border:1px solid #3a3a3a; padding:8px; border-radius:4px; font-size:13px; resize:vertical; font-family:'Noto Sans Devanagari',sans-serif; line-height:1.5; }
input[type=color] { width:34px; height:26px; border:none; background:none; cursor:pointer; }
input[type=range] { width:85px; accent-color:#e63946; cursor:pointer; }
input[type=checkbox] { accent-color:#e63946; width:14px; height:14px; }

.btn { border:none; padding:7px 16px; border-radius:5px; cursor:pointer; font-size:13px; font-weight:bold; transition:all .15s; }
.btn-red  { background:#e63946; color:#fff; } .btn-red:hover  { background:#c1121f; }
.btn-grn  { background:#2d6a4f; color:#fff; } .btn-grn:hover  { background:#1b4332; }
.btn-grn:disabled { background:#333; color:#555; cursor:not-allowed; }

/* BG tabs */
.bg-tabs { display:flex; gap:5px; width:100%; margin-bottom:4px; }
.bgtab { flex:1; text-align:center; padding:5px 3px; border-radius:5px; cursor:pointer; font-size:11px; font-weight:bold; border:2px solid #333; color:#666; background:#1f1f1f; transition:all .15s; }
.bgtab.on { border-color:#e63946; color:#fff; background:#2d0a0a; }
.bgopt { display:none; flex-wrap:wrap; gap:8px; align-items:center; width:100%; }
.bgopt.show { display:flex; }

/* Upload */
.upbox { border:2px dashed #3a3a3a; border-radius:7px; padding:10px 14px; cursor:pointer; color:#666; font-size:12px; position:relative; min-width:150px; text-align:center; transition:all .2s; }
.upbox:hover { border-color:#e63946; color:#e63946; }
.upbox input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upbox img { width:42px; height:42px; border-radius:4px; object-fit:cover; display:none; margin:0 auto 4px; }

/* Gradient presets */
.gps { display:flex; gap:4px; flex-wrap:wrap; }
.gp { width:26px; height:26px; border-radius:4px; cursor:pointer; border:2px solid transparent; transition:border-color .15s; }
.gp:hover,.gp.sel { border-color:#fff; }

/* Solid quick */
.sqc { width:22px; height:22px; border-radius:3px; cursor:pointer; border:1px solid #444; transition:transform .1s; }
.sqc:hover { transform:scale(1.2); }

/* Canvas preview */
.preview-outer { position:relative; width:270px; height:480px; margin-top:14px; border:2px solid #2a2a2a; border-radius:12px; overflow:hidden; background:#000; }
#cv { position:absolute; top:0; left:0; width:100%; height:100%; }

/* Recording overlay */
.rec-dot { position:absolute; top:8px; left:10px; width:10px; height:10px; border-radius:50%; background:#e63946; display:none; box-shadow:0 0 8px #e63946; }
.rec-dot.show { display:block; animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.rec-timer { position:absolute; top:6px; right:8px; background:rgba(0,0,0,.6); color:#fff; font-size:10px; padding:2px 6px; border-radius:8px; font-family:monospace; }

/* Progress */
.progwrap { width:270px; height:6px; background:#1a1a1a; border-radius:3px; margin-top:8px; overflow:hidden; display:none; }
.progbar { height:100%; width:0%; background:linear-gradient(90deg,#e63946,#7209b7,#3a86ff); border-radius:3px; transition:width .15s; }

.status { font-size:11px; color:#888; margin-top:6px; text-align:center; min-height:16px; padding:0 8px; }
.note   { font-size:10px; color:#444; margin-top:3px; text-align:center; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- BG -->
<div class="panel" style="margin-top:10px;">
  <div class="ptitle">🎨 Background</div>
  <div class="bg-tabs">
    <div class="bgtab on"  id="tab-image"    onclick="switchBG('image')">🖼 Image</div>
    <div class="bgtab"     id="tab-gradient" onclick="switchBG('gradient')">🌈 Gradient</div>
    <div class="bgtab"     id="tab-solid"    onclick="switchBG('solid')">⬛ Solid</div>
    <div class="bgtab"     id="tab-theme"    onclick="switchBG('theme')">✨ Theme</div>
  </div>

  <!-- IMAGE -->
  <div class="bgopt show" id="opt-image">
    <div class="upbox">
      <input type="file" id="imgFile" accept="image/*" onchange="loadImg(event)">
      <img id="imgThumb">
      <div id="upLbl">📁 Image upload karo</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;">
      <label>Overlay: <input type="range" id="overlayOp" min="0" max="90" value="40" oninput="V('opLbl',this.value+'%')"> <span id="opLbl">40%</span></label>
      <label>Color:   <input type="color"  id="overlayClr" value="#000000"></label>
      <label>Blur:    <input type="range" id="bgBlur" min="0" max="15" value="0" oninput="V('blurLbl',this.value+'px')"> <span id="blurLbl">0px</span></label>
    </div>
  </div>

  <!-- GRADIENT -->
  <div class="bgopt" id="opt-gradient">
    <div style="display:flex;flex-direction:column;gap:5px;width:100%;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <label>Dir: <select id="gradDir"><option value="tb">↓ Top-Bottom</option><option value="lr">→ Left-Right</option><option value="diag">↘ Diagonal</option></select></label>
        <label>C1:<input type="color" id="gc1" value="#0a0a2e"></label>
        <label>C2:<input type="color" id="gc2" value="#6a0572"></label>
        <label>C3:<input type="color" id="gc3" value="#1a0533"></label>
      </div>
      <div style="color:#555;font-size:10px;margin-bottom:2px;">Quick presets:</div>
      <div class="gps" id="gps"></div>
    </div>
  </div>

  <!-- SOLID -->
  <div class="bgopt" id="opt-solid">
    <label>Color:<input type="color" id="solidClr" value="#0a0a2e"></label>
    <div id="sqRow" style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;"></div>
  </div>

  <!-- THEME -->
  <div class="bgopt" id="opt-theme">
    <label>Theme:
      <select id="thSel">
        <option value="stars">✨ Starry Night</option>
        <option value="sunset">🌅 Sunset</option>
        <option value="ocean">🌊 Ocean</option>
        <option value="forest">🌿 Forest</option>
        <option value="aurora">🌌 Aurora</option>
        <option value="fire">🔥 Fire</option>
      </select>
    </label>
  </div>
</div>

<!-- TEXT -->
<div class="panel">
  <div class="ptitle">✍️ Text & Style</div>
  <label>Color:<input type="color" id="txtClr" value="#FFD700"></label>
  <label>Size:<input type="range" id="fontSize" min="12" max="36" value="22" oninput="V('fsLbl',this.value+'px')"><span id="fsLbl">22px</span></label>
  <label>Glow:<input type="color" id="glowClr" value="#ff6b00"></label>
  <label>Bold:<input type="checkbox" id="boldCk" checked></label>
  <label>Outline:<input type="checkbox" id="outCk"></label>
</div>

<div class="panel">
  <div class="ptitle">📝 Text (Hindi / English)</div>
  <textarea id="txtIn" style="width:100%;min-height:64px;">जो सपने देखते हैं वो रात को भी जागते हैं। हर मुश्किल एक नया मोड़ है। हिम्मत रखो मंजिल दूर नहीं। मेहनत का फल मीठा होता है। बस एक कदम और सफलता तुम्हारी है।</textarea>
</div>

<div class="panel" style="gap:10px;">
  <button class="btn btn-red" onclick="applyAll()">▶ Preview</button>
  <button class="btn btn-grn" id="recBtn" onclick="startRec()">⬇ Download Video (WebM)</button>
  <span style="font-size:11px;color:#555;">540×960 • 9:16 • 7 sec</span>
</div>

<!-- PREVIEW -->
<div class="preview-outer">
  <canvas id="cv"></canvas>
  <div class="rec-dot" id="recDot"></div>
  <div class="rec-timer" id="recTimer">0.0s</div>
</div>
<div class="progwrap" id="pw"><div class="progbar" id="pb"></div></div>
<div class="status" id="status">Preview dekho phir video download karo 🎬</div>
<div class="note">Chrome / Edge mein best kaam karta hai • WebM format (WhatsApp, Instagram pe chalega)</div>

<script>
// ── helpers ──────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const V=(id,v)=>$(id).textContent=v;

// ── Stars ────────────────────────────────────────────────────
let stars=[];
function mkStars(w,h){
  stars=[];
  for(let i=0;i<180;i++) stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.8+0.3,sp:Math.random()*0.5+0.1,ph:Math.random()*6.28,br:Math.random()});
}

// ── Gradient presets ─────────────────────────────────────────
const GP=[
  ['#0a0a2e','#6a0572','#1a0533'],['#1a0000','#8b0000','#ff4500'],
  ['#0d1f0f','#1a5c2a','#4caf50'],['#020b18','#0a3d62','#74b9ff'],
  ['#2d1b69','#11998e','#38ef7d'],['#fc5c7d','#6a3093','#1a1a2e'],
  ['#000','#434343','#ccc'],     ['#f7971e','#ffd200','#fc4a1a'],
  ['#1a1a2e','#16213e','#0f3460'],['#240046','#7b2d8b','#e040fb'],
];
(()=>{
  const el=$('gps');
  GP.forEach(([a,b,c])=>{
    const d=document.createElement('div'); d.className='gp';
    d.style.background=`linear-gradient(135deg,${a},${b},${c})`;
    d.onclick=()=>{ $('gc1').value=a; $('gc2').value=b; $('gc3').value=c; el.querySelectorAll('.gp').forEach(p=>p.classList.remove('sel')); d.classList.add('sel'); applyAll(); };
    el.appendChild(d);
  });
})();
(()=>{
  const sc=['#000','#0a0a2e','#1a0533','#0d1f0f','#1a0000','#fff','#1a1a1a','#0d2137','#1c0a00','#001a33'];
  const el=$('sqRow');
  sc.forEach(c=>{ const d=document.createElement('div'); d.className='sqc'; d.style.background=c; d.onclick=()=>{ $('solidClr').value=c; applyAll(); }; el.appendChild(d); });
})();

function switchBG(t){
  ['image','gradient','solid','theme'].forEach(k=>{
    $('tab-'+k).classList.toggle('on',k===t);
    $('opt-'+k).classList.toggle('show',k===t);
  });
  applyAll();
}

// ── Image load ───────────────────────────────────────────────
let upImg=null;
function loadImg(e){
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=ev=>{ const img=new Image(); img.onload=()=>{ upImg=img; $('imgThumb').src=ev.target.result; $('imgThumb').style.display='block'; $('upLbl').textContent='✓ '+f.name.slice(0,20); applyAll(); }; img.src=ev.target.result; };
  rd.readAsDataURL(f);
}

// ── hex → rgb ────────────────────────────────────────────────
function h2r(h){ return {r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}; }

// ── Background drawing ───────────────────────────────────────
function drawBG(ctx,el,s,W,H){
  ctx.clearRect(0,0,W,H);
  const bt=s.bgType||'theme';
  if(bt==='image'&&upImg){
    if(s.blur>0){ctx.save();ctx.filter=`blur(${s.blur}px)`;}
    const sc=Math.max(W/upImg.width,H/upImg.height);
    const dw=upImg.width*sc,dh=upImg.height*sc;
    ctx.drawImage(upImg,(W-dw)/2,(H-dh)/2,dw,dh);
    if(s.blur>0){ctx.filter='none';ctx.restore();}
    const {r,g,b}=h2r(s.overlayClr);
    ctx.fillStyle=`rgba(${r},${g},${b},${s.overlayOp/100})`; ctx.fillRect(0,0,W,H);
  } else if(bt==='gradient'){
    const [x1,y1,x2,y2]=s.gradDir==='lr'?[0,0,W,0]:s.gradDir==='diag'?[0,0,W,H]:[0,0,0,H];
    const g=ctx.createLinearGradient(x1,y1,x2,y2);
    const sh=(Math.sin(el*0.0006)+1)/2*0.1;
    g.addColorStop(0,s.gc1); g.addColorStop(Math.min(.99,.5+sh),s.gc2); g.addColorStop(1,s.gc3);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  } else if(bt==='solid'){
    ctx.fillStyle=s.solidClr; ctx.fillRect(0,0,W,H);
  } else {
    drawTheme(ctx,el,s.theme,W,H);
  }
}

function drawTheme(ctx,t,th,W,H){
  const lg=(s,e)=>{ const g=ctx.createLinearGradient(0,0,0,H); s.forEach(([p,c])=>g.addColorStop(p,c)); return g; };
  if(th==='stars'){
    ctx.fillStyle=lg([[0,'#020514'],[1,'#0d0130']]); ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{ const tw=(Math.sin(t*0.002*s.sp*5+s.ph)+1)/2,a=0.2+0.8*tw*s.br; ctx.beginPath(); ctx.arc(s.x,s.y,s.r*(1+0.3*tw),0,6.28); ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill(); });
  } else if(th==='sunset'){
    ctx.fillStyle=lg([[0,'#0d0d2b'],[.3,'#5c1a6d'],[.6,'#c84b31'],[.8,'#f5a623'],[1,'#1a1a2e']]); ctx.fillRect(0,0,W,H);
    const sy=H*.62+Math.sin(t*.0005)*4,sg=ctx.createRadialGradient(W/2,sy,4,W/2,sy,W*.35);
    sg.addColorStop(0,'rgba(255,220,50,.85)'); sg.addColorStop(.5,'rgba(255,120,30,.35)'); sg.addColorStop(1,'rgba(255,60,0,0)');
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#060612'; ctx.beginPath();
    ctx.moveTo(0,H); [0,H*.72,W*.18,H*.55,W*.38,H*.68,W*.53,H*.5,W*.7,H*.62,W*.85,H*.58,W,H*.65,W,H].reduce((a,v,i,ar)=>{ if(i%2===0){ if(i===0)ctx.lineTo(0,H*.72); else ctx.lineTo(ar[i],ar[i+1]); } return null; });
    ctx.lineTo(W,H); ctx.fill();
  } else if(th==='ocean'){
    ctx.fillStyle=lg([[0,'#020b18'],[.5,'#0a3d62'],[1,'#074f77']]); ctx.fillRect(0,0,W,H);
    for(let i=0;i<5;i++){ const wy=H*.55+i*H*.04+Math.sin(t*.002+i)*8; ctx.strokeStyle=`rgba(100,220,255,${.15-i*.02})`; ctx.lineWidth=1.5; ctx.beginPath(); for(let x=0;x<=W;x+=2){ const y=wy+Math.sin(x*.04+t*.003+i)*6; x?ctx.lineTo(x,y):ctx.moveTo(x,y); } ctx.stroke(); }
  } else if(th==='forest'){
    ctx.fillStyle=lg([[0,'#0a1628'],[.5,'#1a3a2a'],[1,'#0d1f0f']]); ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#040e06'; for(let i=0;i<9;i++){ const tx=i/8*W,th2=H*(.28+((i*37)%10)*.025); ctx.beginPath(); ctx.moveTo(tx,H); ctx.lineTo(tx-W*.07,H-th2); ctx.lineTo(tx+W*.07,H-th2); ctx.closePath(); ctx.fill(); }
    stars.slice(0,35).forEach(s=>{ const fy=H*.2+s.y*.5,tw=Math.sin(t*.003*s.sp*3+s.ph); ctx.beginPath(); ctx.arc(s.x,fy,1.5,0,6.28); ctx.fillStyle=`rgba(180,255,100,${Math.max(0,tw)*.8})`; ctx.fill(); });
  } else if(th==='aurora'){
    ctx.fillStyle='#010a12'; ctx.fillRect(0,0,W,H);
    [['rgba(0,255,150,',0],['rgba(100,50,255,',1.8],['rgba(0,200,255,',3.6]].forEach(([c,bi])=>{ for(let x=0;x<=W;x+=2){ const wy=H*.35+Math.sin(x*.02+t*.001+bi)*H*.1+bi*H*.03,h2=H*.12+Math.sin(x*.03+t*.0008)*H*.04,ag=ctx.createLinearGradient(x,wy-h2,x,wy+h2); ag.addColorStop(0,c+'0)'); ag.addColorStop(.5,c+'.2)'); ag.addColorStop(1,c+'0)'); ctx.fillStyle=ag; ctx.fillRect(x,wy-h2,2,h2*2); } });
    stars.forEach(s=>{ const tw=(Math.sin(t*.002*s.sp*4+s.ph)+1)/2,a=.1+.35*tw*s.br; ctx.beginPath(); ctx.arc(s.x,s.y*.38,s.r,0,6.28); ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill(); });
  } else if(th==='fire'){
    ctx.fillStyle=lg([[0,'#0a0000'],[.4,'#3d0000'],[.7,'#8b1a00'],[1,'#ff4500']]); ctx.fillRect(0,0,W,H);
    for(let i=0;i<7;i++){ const fx=W*(.08+i*.14)+Math.sin(t*.002+i)*14,fh=H*(.3+Math.sin(t*.003+i*1.3)*.1),fg=ctx.createRadialGradient(fx,H,4,fx,H-fh,fh*.55); fg.addColorStop(0,'rgba(255,200,0,.65)'); fg.addColorStop(.4,'rgba(255,80,0,.3)'); fg.addColorStop(1,'rgba(255,0,0,0)'); ctx.fillStyle=fg; ctx.fillRect(0,0,W,H); }
  }
}

// ── Text drawing on canvas ───────────────────────────────────
function drawText(ctx,words,elapsed,s,W,H,DUR){
  const n=words.length; if(!n) return;
  const s0=300,e0=DUR*0.92,iv=(e0-s0)/(n-1||1);
  const ti=elapsed<s0?-1:Math.min(Math.floor((elapsed-s0)/iv),n-1);
  if(ti<0) return;
  const vis=words.slice(0,ti+1);
  const fade=elapsed>DUR*0.93?Math.max(0,1-(elapsed-DUR*0.93)/(DUR*0.07)):1;
  if(fade<=0) return;

  const fs=s.fontSize||22;
  const fw=s.bold?'900':'700';
  ctx.font=`${fw} ${fs}px 'Noto Sans Devanagari',FreeSans,Arial`;
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';

  // wrap into lines
  const maxW=W-60, lines=[], cur=[];
  for(const w of vis){
    const test=cur.concat(w).join(' ');
    if(ctx.measureText(test).width>maxW && cur.length){ lines.push(cur.join(' ')); cur.length=0; }
    cur.push(w);
  }
  if(cur.length) lines.push(cur.join(' '));

  const lh=fs*1.6, totalH=lines.length*lh;
  const sy=H/2-totalH/2+fs*0.8;
  const {r:gr,g:gg,b:gb}=h2r(s.glowClr||'#ff6b00');

  lines.forEach((line,li)=>{
    const y=sy+li*lh;
    // drop shadow
    ctx.globalAlpha=fade*0.9;
    ctx.fillStyle='rgba(0,0,0,1)';
    ctx.fillText(line,W/2+3,y+4);
    // glow
    ctx.globalAlpha=fade*0.4;
    ctx.fillStyle=`rgb(${gr},${gg},${gb})`;
    [[-3,0],[3,0],[0,-3],[0,3]].forEach(([ox,oy])=>ctx.fillText(line,W/2+ox,y+oy));
    // main
    ctx.globalAlpha=fade;
    ctx.fillStyle=s.txtClr||'#FFD700';
    ctx.fillText(line,W/2,y);
    // outline
    if(s.outline){
      ctx.strokeStyle=`rgb(${gr},${gg},${gb})`;
      ctx.lineWidth=Math.max(1.5,fs*0.04);
      ctx.strokeText(line,W/2,y);
    }
  });
  ctx.globalAlpha=1;
}

// ── Progress bar on canvas ───────────────────────────────────
function drawProg(ctx,elapsed,DUR,W,H,clr){
  const {r,g,b}=h2r(clr);
  ctx.globalAlpha=0.8;
  ctx.fillStyle=`rgb(${r},${g},${b})`;
  ctx.fillRect(0,H-10,W*Math.min(elapsed/DUR,1),10);
  ctx.globalAlpha=1;
}

// ── App state ────────────────────────────────────────────────
const PW=270,PH=480,DUR=7000;
let raf,t0,words=[],cfg={};

mkStars(PW,PH);

function applyAll(){
  cfg={
    bgType:document.querySelector('.bgtab.on').id.replace('tab-',''),
    overlayOp:+$('overlayOp').value, overlayClr:$('overlayClr').value,
    blur:+$('bgBlur').value,
    gc1:$('gc1').value, gc2:$('gc2').value, gc3:$('gc3').value, gradDir:$('gradDir').value,
    solidClr:$('solidClr').value, theme:$('thSel').value,
    txtClr:$('txtClr').value, fontSize:+$('fontSize').value,
    bold:$('boldCk').checked, outline:$('outCk').checked, glowClr:$('glowClr').value,
  };
  words=$('txtIn').value.trim().split(/\s+/).filter(Boolean);
  cancelAnimationFrame(raf); t0=null;
  raf=requestAnimationFrame(previewLoop);
}

// ── Preview loop (small canvas) ──────────────────────────────
function previewLoop(ts){
  if(!t0) t0=ts;
  const el=(ts-t0)%DUR;
  const cv=$('cv'); cv.width=PW; cv.height=PH;
  const ctx=cv.getContext('2d');
  drawBG(ctx,el,cfg,PW,PH);
  drawText(ctx,words,el,cfg,PW,PH,DUR);
  drawProg(ctx,el,DUR,PW,PH,cfg.txtClr||'#FFD700');
  $('recTimer').textContent=(el/1000).toFixed(1)+'s';
  raf=requestAnimationFrame(previewLoop);
}

// ════════════════════════════════════════════════════════════
//  VIDEO RECORDING using MediaRecorder + offscreen canvas
// ════════════════════════════════════════════════════════════
async function startRec(){
  const btn=$('recBtn');
  // Check support
  if(!window.MediaRecorder){
    $('status').textContent='❌ MediaRecorder not supported. Chrome/Edge use karo.';
    return;
  }

  btn.disabled=true; btn.textContent='⏺ Recording...';
  $('pw').style.display='block'; $('pb').style.width='0%';
  $('recDot').classList.add('show');
  $('status').textContent='⏺ Recording shuru ho gayi — 7 seconds wait karo...';
  cancelAnimationFrame(raf); t0=null;

  // High-res offscreen canvas (9:16)
  const VW=540, VH=960;
  const oc=document.createElement('canvas');
  oc.width=VW; oc.height=VH;
  const octx=oc.getContext('2d');
  mkStars(VW,VH);

  // Scale font
  const s={...cfg, fontSize: Math.round((cfg.fontSize||22)*VH/PH) };

  // Pick best codec
  const mimeTypes=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'];
  const mime=mimeTypes.find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
  $('status').textContent=`⏺ Recording (${mime.split(';')[0]})... 7 sec wait karo`;

  const chunks=[];
  const stream=oc.captureStream(30); // 30fps
  const mr=new MediaRecorder(stream,{mimeType:mime, videoBitsPerSecond:4_000_000});
  mr.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };

  const FRAMES=30*7; // 30fps × 7sec
  let frame=0;

  return new Promise(resolve=>{
    mr.onstop=()=>{
      const blob=new Blob(chunks,{type:mime});
      const ext=mime.includes('mp4')?'mp4':'webm';
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download=`word_by_word_9x16.${ext}`; a.click();
      setTimeout(()=>URL.revokeObjectURL(url),5000);

      // Restore
      mkStars(PW,PH);
      btn.disabled=false; btn.textContent='⬇ Download Video (WebM)';
      $('recDot').classList.remove('show');
      $('pb').style.width='100%';
      $('status').textContent=`✅ Video download ho gayi! ${Math.round(blob.size/1024)} KB • 540×960 • 7 sec`;
      applyAll(); resolve();
    };

    mr.start(100); // collect data every 100ms

    const startMs=performance.now();

    function renderFrame(){
      const elapsed=performance.now()-startMs;
      const elCapped=Math.min(elapsed,DUR);

      // Render frame to offscreen canvas
      octx.clearRect(0,0,VW,VH);
      drawBG(octx,elCapped,cfg,VW,VH);
      drawText(octx,words,elCapped,s,VW,VH,DUR);
      drawProg(octx,elCapped,DUR,VW,VH,cfg.txtClr||'#FFD700');

      // Mirror to preview
      const pcv=$('cv'); pcv.width=PW; pcv.height=PH;
      const pctx=pcv.getContext('2d');
      pctx.drawImage(oc,0,0,PW,PH);
      $('recTimer').textContent=(elCapped/1000).toFixed(1)+'s';

      // Progress
      $('pb').style.width=Math.round(elCapped/DUR*100)+'%';

      if(elapsed<DUR+200){
        requestAnimationFrame(renderFrame);
      } else {
        mr.stop();
      }
    }

    requestAnimationFrame(renderFrame);
  });
}

// ── Init ─────────────────────────────────────────────────────
applyAll();
</script>
