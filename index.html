<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quote Maker - Create & Download</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Devanagari', 'Georgia', serif;
            background: #1a1a1a;
            color: white;
            overflow-x: hidden;
        }

        .editor-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            max-height: 40vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            overflow-y: auto;
        }

        .editor-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Noto Sans Devanagari', 'Georgia', serif;
            background: rgba(255,255,255,0.95);
        }

        textarea.input-field {
            min-height: 80px;
            resize: vertical;
        }

        .controls-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .toggle-editor {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(102,126,234,0.9);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .preview-container {
            margin-top: 45vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 55vh;
        }

        .canvas-wrapper {
            position: relative;
            max-width: 100%;
        }

        .preview-canvas {
            width: 100%;
            max-width: 540px;
            aspect-ratio: 9/16;
            background: #d5d5d5;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .canvas-profile {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .canvas-profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #333;
            background: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
        }

        .canvas-profile-text {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .canvas-profile-name {
            font-size: 28px;
            font-weight: bold;
            color: #000;
            font-style: italic;
        }

        .canvas-profile-handle {
            font-size: 24px;
            color: #333;
            font-style: italic;
            text-decoration: underline;
        }

        .canvas-text-content {
            position: absolute;
            width: 85%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            cursor: move;
            user-select: none;
            touch-action: none;
            transition: all 0.1s;
        }

        .canvas-main-text {
            font-size: 42px;
            line-height: 1.6;
            color: #000;
            font-weight: 900;
            padding: 0 15px;
            word-wrap: break-word;
        }

        .download-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .editor-panel {
                max-height: 50vh;
            }

            .preview-container {
                margin-top: 55vh;
            }

            .canvas-profile {
                top: 30px;
                gap: 12px;
            }

            .canvas-profile-img {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }

            .canvas-profile-name {
                font-size: 20px;
            }

            .canvas-profile-handle {
                font-size: 18px;
            }

            .canvas-main-text {
                font-size: 32px;
            }

            .toggle-editor, .download-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        .hidden {
            display: none;
        }

        #downloadCanvas {
            display: none;
        }

        .color-input {
            width: 60px;
            height: 40px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="editor-panel" id="editorPanel">
        <div class="editor-title">✨ Quote Maker</div>
        
        <div class="input-group">
            <label class="input-label">Page Name</label>
            <input type="text" id="pageName" class="input-field" placeholder="Classical Author" value="Classical Author">
        </div>

        <div class="input-group">
            <label class="input-label">Page Handle</label>
            <input type="text" id="pageHandle" class="input-field" placeholder="@classicalauthor" value="@classicalauthor">
        </div>

        <div class="input-group">
            <label class="input-label">Profile Emoji/Icon</label>
            <input type="text" id="profileIcon" class="input-field" placeholder="📚" value="📚" maxlength="2">
        </div>

        <div class="input-group">
            <label class="input-label">Your Quote/Poetry Text</label>
            <textarea id="mainText" class="input-field" placeholder="Enter your text here...">यूँ ना छोड़ ज़िंदगी की किताब को खुला,
बेवक्त की हवा ना जाने कौन सा पन्ना पलट दे।</textarea>
        </div>

        <div class="input-group">
            <label class="input-label">Background Color</label>
            <input type="color" id="bgColor" class="color-input" value="#d5d5d5">
        </div>

        <div class="input-group">
            <label class="input-label">Text Color</label>
            <input type="color" id="textColor" class="color-input" value="#000000">
        </div>

        <div class="controls-row">
            <button class="btn btn-primary" onclick="updatePreview()">✓ Update Preview</button>
            <button class="btn btn-secondary" onclick="resetPosition()">↻ Reset Position</button>
        </div>
    </div>

    <button class="toggle-editor" id="toggleBtn" onclick="toggleEditor()">
        ▼ Hide Editor
    </button>

    <div class="preview-container">
        <div class="canvas-wrapper">
            <div class="preview-canvas" id="previewCanvas">
                <div class="canvas-profile">
                    <div class="canvas-profile-img" id="profileImg">📚</div>
                    <div class="canvas-profile-text">
                        <div class="canvas-profile-name" id="displayName">Classical Author</div>
                        <div class="canvas-profile-handle" id="displayHandle">@classicalauthor</div>
                    </div>
                </div>

                <div class="canvas-text-content" id="textContent">
                    <div class="canvas-main-text" id="displayText">यूँ ना छोड़ ज़िंदगी की किताब को खुला,<br>बेवक्त की हवा ना जाने कौन सा पन्ना पलट दे।</div>
                </div>
            </div>
        </div>
    </div>

    <button class="download-btn" onclick="downloadImage()">
        📥 Download Image
    </button>

    <canvas id="downloadCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const editorPanel = document.getElementById('editorPanel');
        const toggleBtn = document.getElementById('toggleBtn');
        const textContent = document.getElementById('textContent');
        const previewCanvas = document.getElementById('previewCanvas');

        let editorVisible = true;
        let currentX = 50;
        let currentY = 50;
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        function toggleEditor() {
            editorVisible = !editorVisible;
            if (editorVisible) {
                editorPanel.style.display = 'block';
                toggleBtn.textContent = '▼ Hide Editor';
            } else {
                editorPanel.style.display = 'none';
                toggleBtn.textContent = '▲ Show Editor';
            }
        }

        function updatePreview() {
            const pageName = document.getElementById('pageName').value;
            const pageHandle = document.getElementById('pageHandle').value;
            const profileIcon = document.getElementById('profileIcon').value;
            const mainText = document.getElementById('mainText').value;
            const bgColor = document.getElementById('bgColor').value;
            const textColor = document.getElementById('textColor').value;

            document.getElementById('displayName').textContent = pageName;
            document.getElementById('displayHandle').textContent = pageHandle;
            document.getElementById('profileImg').textContent = profileIcon;
            document.getElementById('displayText').innerHTML = mainText.replace(/\n/g, '<br>');
            
            previewCanvas.style.background = bgColor;
            document.getElementById('displayText').style.color = textColor;
        }

        function resetPosition() {
            currentX = 50;
            currentY = 50;
            updatePosition();
        }

        function updatePosition() {
            textContent.style.left = currentX + '%';
            textContent.style.top = currentY + '%';
        }

        // Drag functionality
        textContent.addEventListener('mousedown', startDrag);
        textContent.addEventListener('touchstart', startDrag, { passive: false });

        function startDrag(e) {
            isDragging = true;
            const touch = e.type === 'touchstart' ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            
            const rect = textContent.getBoundingClientRect();
            const container = previewCanvas.getBoundingClientRect();
            initialLeft = ((rect.left - container.left) / container.width) * 100;
            initialTop = ((rect.top - container.top) / container.height) * 100;
            
            e.preventDefault();
        }

        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });

        function drag(e) {
            if (!isDragging) return;
            
            const touch = e.type === 'touchmove' ? e.touches[0] : e;
            const container = previewCanvas.getBoundingClientRect();
            const deltaX = touch.clientX - startX;
            const deltaY = touch.clientY - startY;
            
            const deltaXPercent = (deltaX / container.width) * 100;
            const deltaYPercent = (deltaY / container.height) * 100;
            
            currentX = Math.max(5, Math.min(85, initialLeft + deltaXPercent));
            currentY = Math.max(10, Math.min(85, initialTop + deltaYPercent));
            
            updatePosition();
            e.preventDefault();
        }

        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchend', stopDrag);

        function stopDrag() {
            isDragging = false;
        }

        async function downloadImage() {
            // Hide buttons temporarily
            toggleBtn.style.display = 'none';
            document.querySelector('.download-btn').style.display = 'none';

            try {
                const canvas = await html2canvas(previewCanvas, {
                    width: 1080,
                    height: 1920,
                    scale: 2,
                    backgroundColor: document.getElementById('bgColor').value,
                    logging: false,
                    useCORS: true
                });

                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    const timestamp = new Date().getTime();
                    link.download = `quote-${timestamp}.png`;
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                });

            } catch (error) {
                console.error('Download failed:', error);
                alert('Download failed. Please try again.');
            } finally {
                toggleBtn.style.display = 'block';
                document.querySelector('.download-btn').style.display = 'block';
            }
        }

        // Initialize
        updatePosition();
    </script>
</body>
</html>
