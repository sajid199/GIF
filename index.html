<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; flex-direction:column; align-items:center; font-family:sans-serif; }
.panel { width:100%; max-width:700px; background:#1a1a1a; border-bottom:1px solid #333; padding:10px 14px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.panel label { color:#bbb; font-size:12px; display:flex; align-items:center; gap:4px; }
.panel select, .panel input[type=text] { background:#2a2a2a; color:#fff; border:1px solid #444; padding:4px 8px; border-radius:4px; font-size:12px; }
.panel input[type=color] { width:34px; height:26px; border:none; background:none; cursor:pointer; }
.panel input[type=range] { width:80px; accent-color:#e63946; }
.panel button { background:#e63946; color:#fff; border:none; padding:5px 13px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:bold; }
.panel button:hover { background:#c1121f; }
.panel button.dl { background:#2d6a4f; }
.panel button.dl:hover { background:#1b4332; }
.panel button.dl:disabled { background:#444; cursor:not-allowed; }
.bg-tabs { display:flex; gap:6px; width:100%; }
.bg-tab { flex:1; text-align:center; padding:6px 4px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:bold; border:2px solid #333; color:#888; background:#222; transition:all 0.2s; }
.bg-tab.active { border-color:#e63946; color:#fff; background:#3a1010; }
.bg-option { display:none; width:100%; }
.bg-option.show { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.img-upload-area { border:2px dashed #444; border-radius:8px; padding:10px 16px; text-align:center; cursor:pointer; color:#888; font-size:12px; transition:border-color 0.2s; position:relative; min-width:180px; }
.img-upload-area:hover { border-color:#e63946; color:#e63946; }
.img-upload-area input { position:absolute; inset:0; opacity:0; cursor:pointer; }
.img-preview { width:48px; height:48px; border-radius:4px; object-fit:cover; border:1px solid #444; display:none; }
.grad-presets { display:flex; gap:5px; flex-wrap:wrap; }
.grad-preset { width:30px; height:30px; border-radius:4px; cursor:pointer; border:2px solid transparent; transition:border-color 0.2s; }
.grad-preset:hover, .grad-preset.active { border-color:#fff; }
.gif-wrapper { position:relative; width:270px; height:480px; overflow:hidden; border:2px solid #333; border-radius:10px; margin-top:14px; }
#bgCanvas { position:absolute; top:0; left:0; width:100%; height:100%; }
.text-layer { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:20px 14px; pointer-events:none; }
.word-row { display:flex; flex-wrap:wrap; justify-content:center; align-items:center; }
.word { display:inline-block; opacity:0; margin:2px 4px; font-weight:900; font-size:20px; letter-spacing:0.5px; line-height:1.5; font-family:'Noto Sans Devanagari','Arial Unicode MS',Arial,sans-serif; transition:none; }
.progress-bar { position:absolute; bottom:0; left:0; height:4px; background:linear-gradient(90deg,#f72585,#7209b7,#3a86ff,#06d6a0,#ffbe0b); }
.timer-badge { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.55); color:#fff; font-size:11px; padding:2px 7px; border-radius:10px; font-family:monospace; }
.info { color:#555; font-size:11px; margin-top:7px; text-align:center; }
.dl-status { color:#aaa; font-size:11px; margin-top:3px; text-align:center; min-height:16px; padding:0 8px; }
.progress-wrap { width:270px; height:8px; background:#222; border-radius:4px; margin-top:6px; display:none; }
.progress-fill { height:100%; background:linear-gradient(90deg,#2d6a4f,#52b788); border-radius:4px; width:0%; transition:width 0.1s; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="panel">
  <div class="bg-tabs">
    <div class="bg-tab active" onclick="switchBG('image')" id="tab-image">🖼 Image</div>
    <div class="bg-tab" onclick="switchBG('gradient')" id="tab-gradient">🎨 Gradient</div>
    <div class="bg-tab" onclick="switchBG('solid')" id="tab-solid">⬛ Solid</div>
    <div class="bg-tab" onclick="switchBG('theme')" id="tab-theme">✨ Themes</div>
  </div>
  <div class="bg-option show" id="opt-image">
    <div class="img-upload-area" id="uploadArea">
      <input type="file" id="imgInput" accept="image/*" onchange="loadImage(event)">
      <img id="imgPreview" class="img-preview">
      <div id="uploadText">📁 Click to upload image</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <label>Overlay opacity: <input type="range" id="overlayOpacity" min="0" max="90" value="35"> <span id="opacityVal">35%</span></label>
      <label>Overlay color: <input type="color" id="overlayColor" value="#000000"></label>
      <label>Blur: <input type="range" id="bgBlur" min="0" max="15" value="0"> <span id="blurVal">0px</span></label>
    </div>
  </div>
  <div class="bg-option" id="opt-gradient">
    <div style="display:flex;flex-direction:column;gap:6px;width:100%;">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <label>Direction: <select id="gradDir"><option value="tb">↓ Top-Bottom</option><option value="lr">→ Left-Right</option><option value="diag">↘ Diagonal</option></select></label>
        <label>Color 1: <input type="color" id="grad1" value="#0a0a2e"></label>
        <label>Color 2: <input type="color" id="grad2" value="#6a0572"></label>
        <label>Color 3: <input type="color" id="grad3" value="#1a0533"></label>
      </div>
      <div><div style="color:#888;font-size:11px;margin-bottom:4px;">Quick presets:</div><div class="grad-presets" id="gradPresets"></div></div>
    </div>
  </div>
  <div class="bg-option" id="opt-solid">
    <label>Color: <input type="color" id="solidColor" value="#0a0a2e"></label>
    <div id="solidQuick" style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;"></div>
  </div>
  <div class="bg-option" id="opt-theme">
    <label>Theme: <select id="themeSelect"><option value="stars">✨ Starry Night</option><option value="sunset">🌅 Sunset</option><option value="ocean">🌊 Ocean</option><option value="forest">🌿 Forest</option><option value="aurora">🌌 Aurora</option><option value="fire">🔥 Fire</option></select></label>
  </div>
</div>

<div class="panel">
  <label>Text color: <input type="color" id="txtColor" value="#FFD700"></label>
  <label>Size: <input type="range" id="fontSize" min="12" max="32" value="20"> <span id="fsVal">20px</span></label>
  <label>Shadow: <input type="color" id="shadowColor" value="#ff6b00"></label>
  <label>Bold: <input type="checkbox" id="boldText" checked></label>
  <label>Stroke: <input type="checkbox" id="strokeText"></label>
  <button onclick="applySettings()">▶ Apply</button>
  <button class="dl" id="dlBtn" onclick="startRecord()">⬇ Download GIF</button>
</div>

<div class="panel">
  <label style="flex:1;display:flex;flex-direction:column;gap:4px;width:100%;">
    <span>Text (50 words):</span>
    <input type="text" id="customText" style="width:100%;min-width:280px;" value="जो सपने देखते हैं वो रात को भी जागते हैं। हर मुश्किल एक नया मोड़ है। हिम्मत रखो मंजिल दूर नहीं। मेहनत का फल मीठा होता है। बस एक कदम और सफलता तुम्हारी है।">
  </label>
</div>

<div class="gif-wrapper">
  <canvas id="bgCanvas"></canvas>
  <div class="text-layer"><div class="word-row" id="wordContainer"></div></div>
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
  <div class="timer-badge" id="timerBadge">0.0s</div>
</div>
<div class="progress-wrap" id="encodeWrap"><div class="progress-fill" id="encodeFill"></div></div>
<div class="info">9:16 HD • 7 Second Loop • Word by Word</div>
<div class="dl-status" id="dlStatus"></div>

<script>
// ============================================================
// INLINE GIF ENCODER — no Worker, no external script needed
// Based on Jnordberg's gif.js LZW logic, ported inline
// ============================================================
const GIFEncoder = (() => {
  function ByteArray() { this.data = []; }
  ByteArray.prototype.writeByte = function(b){ this.data.push(b & 0xff); };
  ByteArray.prototype.writeShort = function(s){ this.writeByte(s & 0xff); this.writeByte((s >> 8) & 0xff); };
  ByteArray.prototype.writeBytes = function(arr){ for(let b of arr) this.writeByte(b); };
  ByteArray.prototype.toUint8Array = function(){ return new Uint8Array(this.data); };

  function NeuQuant(pixels, samplefac) {
    const netsize = 256, maxnetpos = netsize - 1, netbiasshift = 4, ncycles = 100;
    const intbiasshift = 16, intbias = 1 << intbiasshift, gammashift = 10;
    const betashift = 10, beta = intbias >> betashift, betagamma = intbias << (gammashift - betashift);
    const initrad = netsize >> 3, radiusbiasshift = 6, radiusbias = 1 << radiusbiasshift;
    const initradius = initrad * radiusbias, radiusdec = 30;
    const alphabiasshift = 10, initalpha = 1 << alphabiasshift;
    const radbiasshift = 8, radbias = 1 << radbiasshift, alpharadbshift = alphabiasshift + radbiasshift, alpharadbias = 1 << alpharadbshift;
    let network = [], netindex = new Int32Array(256), bias = new Int32Array(netsize), freq = new Int32Array(netsize), radpower = new Int32Array(initrad);
    for(let i=0;i<netsize;i++){ let v=(i<<(netbiasshift+8))/netsize; network[i]=[v,v,v,0]; freq[i]=intbias/netsize; bias[i]=0; }
    function colormap(){ let map=[]; let index=new Int32Array(netsize); for(let i=0;i<netsize;i++) index[network[i][3]]=i; let k=0; for(let l=0;l<netsize;l++){ let j=index[l]; map[k++]=network[j][0]; map[k++]=network[j][1]; map[k++]=network[j][2]; } return map; }
    function inxbuild(){ let previouscol=0,startpos=0; for(let i=0;i<netsize;i++){ let p=network[i]; let smallpos=i,smallval=p[1]; for(let j=i+1;j<netsize;j++){ let q=network[j]; if(q[1]<smallval){ smallpos=j; smallval=q[1]; } } let q=network[smallpos]; if(i!=smallpos){ let j=q[0]; q[0]=p[0]; p[0]=j; j=q[1]; q[1]=p[1]; p[1]=j; j=q[2]; q[2]=p[2]; p[2]=j; j=q[3]; q[3]=p[3]; p[3]=j; } if(smallval!=previouscol){ netindex[previouscol]=( startpos+i)>>1; for(let j=previouscol+1;j<smallval;j++) netindex[j]=i; previouscol=smallval; startpos=i; } } netindex[previouscol]=(startpos+maxnetpos)>>1; for(let j=previouscol+1;j<256;j++) netindex[j]=maxnetpos; }
    function contest(b,g,r){ let bestd=~(1<<31),bestbiasd=bestd,bestpos=-1,bestbiaspos=bestpos; for(let i=0;i<netsize;i++){ let n=network[i]; let dist=Math.abs(n[0]-b)+Math.abs(n[1]-g)+Math.abs(n[2]-r); if(dist<bestd){ bestd=dist; bestpos=i; } let biasdist=dist-(( bias[i])>>( intbiasshift- netbiasshift)); if(biasdist<bestbiasd){ bestbiasd=biasdist; bestbiaspos=i; } let betafreq=freq[i]>>betashift; freq[i]-=betafreq; bias[i]+=betafreq<<gammashift; } freq[bestpos]+=beta; bias[bestpos]-=betagamma; return bestbiaspos; }
    function altersingle(alpha,i,b,g,r){ let n=network[i]; n[0]-=(alpha*(n[0]-b))/initalpha; n[1]-=(alpha*(n[1]-g))/initalpha; n[2]-=(alpha*(n[2]-r))/initalpha; }
    function alterneigh(radius,i,b,g,r){ let lo=Math.abs(i-radius),hi=Math.min(i+radius,netsize); let j=i+1,k=i-1,m=1; while(j<hi||k>lo){ let rad=radpower[m++]; if(j<hi){ let p=network[j++]; p[0]-=(rad*(p[0]-b))/alpharadbias; p[1]-=(rad*(p[1]-g))/alpharadbias; p[2]-=(rad*(p[2]-r))/alpharadbias; } if(k>lo){ let p=network[k--]; p[0]-=(rad*(p[0]-b))/alpharadbias; p[1]-=(rad*(p[1]-g))/alpharadbias; p[2]-=(rad*(p[2]-r))/alpharadbias; } } }
    function learn(){ let lengthcount=pixels.length; let alphadec=30+(samplefac-1)/3; let samplepixels=Math.floor(lengthcount/(3*samplefac)); let delta=Math.floor(samplepixels/ncycles); let alpha=initalpha; let radius=initradius; let rad=radius>>radiusbiasshift; if(rad<=1) rad=0; for(let i=0;i<rad;i++) radpower[i]=Math.floor(alpha*(((rad*rad-i*i)*radbias)/(rad*rad))); let step; if(lengthcount<12800) step=3; else if(lengthcount<102400) step=3*samplefac; else step=3*8; if(step%3!=0) step+=1; if(lengthcount%step!=0) step+=3*(lengthcount%3!=0?1:0); let pos=0,i=0; while(i<samplepixels){ let b=(pixels[pos]&0xff)<<netbiasshift; let g=(pixels[pos+1]&0xff)<<netbiasshift; let r=(pixels[pos+2]&0xff)<<netbiasshift; let j=contest(b,g,r); altersingle(alpha,j,b,g,r); if(rad!=0) alterneigh(rad,j,b,g,r); pos+=step; if(pos>=lengthcount) pos-=lengthcount; i++; if(delta==0) delta=1; if(i%delta==0){ alpha-=Math.floor(alpha/alphadec); radius-=Math.floor(radius/radiusdec); rad=radius>>radiusbiasshift; if(rad<=1) rad=0; for(let j=0;j<rad;j++) radpower[j]=Math.floor(alpha*(((rad*rad-j*j)*radbias)/(rad*rad))); } } }
    function map(b,g,r){ let bestd=1000,bestpos=bestd; let i=netindex[g]>>netbiasshift; let j=i-1; while(i<netsize||j>=0){ if(i<netsize){ let p=network[i]; let dist=p[1]-g; if(dist>=bestd) i=netsize; else{ i++; if(dist<0) dist=-dist; let a=p[0]-b; if(a<0) a=-a; dist+=a; if(dist<bestd){ a=p[2]-r; if(a<0) a=-a; dist+=a; if(dist<bestd){ bestd=dist; bestpos=p[3]; } } } } if(j>=0){ let p=network[j]; let dist=g-p[1]; if(dist>=bestd) j=-1; else{ j--; if(dist<0) dist=-dist; let a=p[0]-b; if(a<0) a=-a; dist+=a; if(dist<bestd){ a=p[2]-r; if(a<0) a=-a; dist+=a; if(dist<bestd){ bestd=dist; bestpos=p[3]; } } } } } return bestpos; }
    learn(); inxbuild();
    return { map, colormap };
  }

  function LZWEncoder(width,height,pixels,colorDepth){
    const MAXCODE=4096;
    let initCodeSize=Math.max(2,colorDepth);
    let accum=[],htab=[],codetab=[],cur_accum=0,cur_bits=0,a_count=0;
    let free_ent=0,maxcode=0,clear_flg=false;
    const masks=[0x0000,0x0001,0x0003,0x0007,0x000F,0x001F,0x003F,0x007F,0x00FF,0x01FF,0x03FF,0x07FF,0x0FFF,0x1FFF,0x3FFF,0x7FFF,0xFFFF];
    let n_bits,ClearCode,EOFCode,remaining,curPixel;
    function MAXCODE2(n){ return (1<<n)-1; }
    function nextPixel(){ if(remaining===0) return 0xff; remaining--; let pix=pixels[curPixel++]; return pix&0xff; }
    function output(code,outs){ cur_accum&=masks[cur_bits]; cur_accum|=(code<<cur_bits); cur_bits+=n_bits; while(cur_bits>=8){ accum[a_count++]=cur_accum&0xff; if(a_count>=254) flush_char(outs); cur_accum>>=8; cur_bits-=8; } if(free_ent>maxcode||clear_flg){ if(clear_flg){ n_bits=initCodeSize+1; maxcode=MAXCODE2(n_bits); clear_flg=false; } else{ n_bits++; if(n_bits==12) maxcode=MAXCODE; else maxcode=MAXCODE2(n_bits); } } if(code==EOFCode){ while(cur_bits>0){ accum[a_count++]=cur_accum&0xff; if(a_count>=254) flush_char(outs); cur_accum>>=8; cur_bits-=8; } if(a_count>0) flush_char(outs); } }
    function cl_hash(hsize){ for(let i=0;i<hsize;i++) htab[i]=-1; }
    function flush_char(outs){ if(a_count>0){ outs.writeByte(a_count); outs.writeBytes(accum.slice(0,a_count)); a_count=0; } }
    function cl_block(outs){ cl_hash(5003); free_ent=ClearCode+2; clear_flg=true; output(ClearCode,outs); }
    function compress(init_bits,outs){ let fcode,c,i,ent,disp,hsize_reg,hshift; n_bits=init_bits; maxcode=MAXCODE2(n_bits); ClearCode=1<<(init_bits-1); EOFCode=ClearCode+1; free_ent=ClearCode+2; clear_flg=false; a_count=0; ent=nextPixel(); hshift=0; for(fcode=5003;fcode<65536;fcode*=2) hshift++; hshift=8-hshift; hsize_reg=5003; cl_hash(hsize_reg); output(ClearCode,outs); outer: while((c=nextPixel())!==0xff){ fcode=(c<<12)+ent; i=((c<<hshift)^ent); if(htab[i]===fcode){ ent=codetab[i]; continue; } else if(htab[i]>=0){ disp=hsize_reg-i; if(i===0) disp=1; do{ if((i-=disp)<0) i+=hsize_reg; if(htab[i]===fcode){ ent=codetab[i]; continue outer; } } while(htab[i]>=0); } output(ent,outs); ent=c; if(free_ent<MAXCODE){ codetab[i]=free_ent++; htab[i]=fcode; } else { cl_block(outs); } } output(ent,outs); output(EOFCode,outs); }
    return { encode(outs){ outs.writeByte(initCodeSize); remaining=width*height; curPixel=0; compress(initCodeSize+1,outs); outs.writeByte(0); } };
  }

  function encodeGIF(frames, width, height, delay) {
    const ba = new ByteArray();
    // Header
    ba.writeBytes([0x47,0x49,0x46,0x38,0x39,0x61]); // GIF89a
    ba.writeShort(width); ba.writeShort(height);
    ba.writeByte(0); ba.writeByte(0); ba.writeByte(0); // no global color table
    // Netscape loop extension
    ba.writeBytes([0x21,0xFF,0x0B]); ba.writeBytes([78,69,84,83,67,65,80,69,50,46,48]); ba.writeBytes([0x03,0x01,0x00,0x00,0x00]);
    for(let fi=0; fi<frames.length; fi++) {
      const {pixels: rawPixels} = frames[fi];
      // Quantize
      const nq = NeuQuant(rawPixels, 10);
      const colormap = nq.colormap();
      const indexedPixels = new Uint8Array(width * height);
      for(let i=0; i<width*height; i++) indexedPixels[i] = nq.map(rawPixels[i*3], rawPixels[i*3+1], rawPixels[i*3+2]);
      // Graphic control
      ba.writeByte(0x21); ba.writeByte(0xF9); ba.writeByte(0x04);
      ba.writeByte(0x00); ba.writeShort(Math.round(delay/10)); ba.writeByte(0); ba.writeByte(0);
      // Image descriptor
      ba.writeByte(0x2C); ba.writeShort(0); ba.writeShort(0); ba.writeShort(width); ba.writeShort(height);
      ba.writeByte(0x80 | 7); // local color table, size 256
      // Color table
      for(let i=0; i<256; i++){
        ba.writeByte(colormap[i*3]||0); ba.writeByte(colormap[i*3+1]||0); ba.writeByte(colormap[i*3+2]||0);
      }
      // Image data
      const enc = LZWEncoder(width, height, indexedPixels, 8);
      enc.encode(ba);
    }
    ba.writeByte(0x3B); // Trailer
    return ba.toUint8Array();
  }

  return { encode: encodeGIF };
})();

// ============================================================
const DURATION = 7000, PW = 270, PH = 480;
let animFrame, startTime, words=[], wordEls=[], settings={}, lastWordIdx=-1;
let uploadedImage=null, stars=[];

function initStars(w,h){ stars=[]; for(let i=0;i<140;i++) stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.3,speed:Math.random()*0.3+0.1,twinkle:Math.random()*Math.PI*2,bright:Math.random()}); }
initStars(PW,PH);

// Gradient presets
const gradPresetList=[['#0a0a2e','#6a0572','#1a0533'],['#1a0000','#8b0000','#ff4500'],['#0d1f0f','#1a5c2a','#4caf50'],['#020b18','#0a3d62','#74b9ff'],['#2d1b69','#11998e','#38ef7d'],['#fc5c7d','#6a3093','#1a1a2e'],['#000000','#434343','#cccccc'],['#f7971e','#ffd200','#fc4a1a']];
const presetsEl=document.getElementById('gradPresets');
gradPresetList.forEach((cols,i)=>{ const d=document.createElement('div'); d.className='grad-preset'; d.style.background=`linear-gradient(135deg,${cols[0]},${cols[1]},${cols[2]})`; d.onclick=()=>{ document.getElementById('grad1').value=cols[0]; document.getElementById('grad2').value=cols[1]; document.getElementById('grad3').value=cols[2]; presetsEl.querySelectorAll('.grad-preset').forEach(p=>p.classList.remove('active')); d.classList.add('active'); applySettings(); }; presetsEl.appendChild(d); });

const solidColors=['#000000','#0a0a2e','#1a0533','#0d1f0f','#1a0000','#ffffff','#1a1a1a','#0d2137'];
const sq=document.getElementById('solidQuick'); sq.innerHTML='<span style="color:#888;font-size:11px;">Quick:</span>';
solidColors.forEach(c=>{ const d=document.createElement('div'); d.style.cssText=`width:24px;height:24px;background:${c};border-radius:4px;cursor:pointer;border:1px solid #555;`; d.onclick=()=>{ document.getElementById('solidColor').value=c; applySettings(); }; sq.appendChild(d); });

function switchBG(type){ ['image','gradient','solid','theme'].forEach(t=>{ document.getElementById('tab-'+t).classList.toggle('active',t===type); document.getElementById('opt-'+t).classList.toggle('show',t===type); }); applySettings(); }

function loadImage(e){ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=ev=>{ const img=new Image(); img.onload=()=>{ uploadedImage=img; document.getElementById('imgPreview').src=ev.target.result; document.getElementById('imgPreview').style.display='inline-block'; document.getElementById('uploadText').textContent='✓ '+file.name.slice(0,20); applySettings(); }; img.src=ev.target.result; }; reader.readAsDataURL(file); }

document.getElementById('overlayOpacity').oninput=function(){ document.getElementById('opacityVal').textContent=this.value+'%'; };
document.getElementById('bgBlur').oninput=function(){ document.getElementById('blurVal').textContent=this.value+'px'; };
document.getElementById('fontSize').oninput=function(){ document.getElementById('fsVal').textContent=this.value+'px'; };

function hexToRgb(hex){ return {r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)}; }

function drawBG(ctx,elapsed,s,W,H){
  ctx.clearRect(0,0,W,H);
  const bgType=s.bgType||'theme';
  if(bgType==='image'&&uploadedImage){
    if(s.blur>0){ ctx.save(); ctx.filter=`blur(${s.blur}px)`; }
    const iw=uploadedImage.width,ih=uploadedImage.height,scale=Math.max(W/iw,H/ih),dw=iw*scale,dh=ih*scale,dx=(W-dw)/2,dy=(H-dh)/2;
    ctx.drawImage(uploadedImage,dx,dy,dw,dh);
    if(s.blur>0){ ctx.filter='none'; ctx.restore(); }
    const {r,g,b}=hexToRgb(s.overlayColor||'#000000');
    ctx.fillStyle=`rgba(${r},${g},${b},${(s.overlayOpacity||35)/100})`; ctx.fillRect(0,0,W,H);
  } else if(bgType==='gradient'){
    const dir=s.gradDir||'tb';
    const x2=dir==='lr'?W:dir==='diag'?W:0, y2=dir==='tb'?H:dir==='diag'?H:0;
    const x1=dir==='diag'?0:0, y1=0;
    const g2=ctx.createLinearGradient(x1,y1,x2,y2);
    const sh=(Math.sin(elapsed*0.0005)+1)/2*0.1;
    g2.addColorStop(0,s.grad1); g2.addColorStop(0.5+sh,s.grad2); g2.addColorStop(1,s.grad3);
    ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);
  } else if(bgType==='solid'){
    ctx.fillStyle=s.solidColor||'#0a0a2e'; ctx.fillRect(0,0,W,H);
  } else {
    drawTheme(ctx,elapsed,s.theme||'stars',W,H);
  }
}

function drawTheme(ctx,t,theme,W,H){
  if(theme==='stars'){
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#020514'); g.addColorStop(1,'#0d0130');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{ const tw=Math.sin(t*0.002*s.speed*5+s.twinkle),a=0.3+0.7*((tw+1)/2)*s.bright; ctx.beginPath(); ctx.arc(s.x,s.y,s.r*(1+0.3*tw),0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill(); });
  } else if(theme==='sunset'){
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0d0d2b'); g.addColorStop(0.3,'#5c1a6d'); g.addColorStop(0.6,'#c84b31'); g.addColorStop(0.8,'#f5a623'); g.addColorStop(1,'#1a1a2e');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    const sy=H*0.62+Math.sin(t*0.0005)*4,sg=ctx.createRadialGradient(W/2,sy,5,W/2,sy,W*0.35);
    sg.addColorStop(0,'rgba(255,220,50,0.85)'); sg.addColorStop(0.5,'rgba(255,120,30,0.35)'); sg.addColorStop(1,'rgba(255,60,0,0)');
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#060612'; ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,H*0.72); ctx.lineTo(W*0.18,H*0.55); ctx.lineTo(W*0.38,H*0.68); ctx.lineTo(W*0.53,H*0.5); ctx.lineTo(W*0.7,H*0.62); ctx.lineTo(W*0.85,H*0.58); ctx.lineTo(W,H*0.65); ctx.lineTo(W,H); ctx.fill();
  } else if(theme==='ocean'){
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#020b18'); g.addColorStop(0.5,'#0a3d62'); g.addColorStop(1,'#074f77');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    for(let i=0;i<5;i++){ const wy=H*0.55+i*H*0.04+Math.sin(t*0.002+i)*8; ctx.strokeStyle=`rgba(100,220,255,${0.15-i*0.02})`; ctx.lineWidth=1.5; ctx.beginPath(); for(let x=0;x<=W;x+=2){ const y=wy+Math.sin(x*0.04+t*0.003+i)*6; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.stroke(); }
  } else if(theme==='forest'){
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a1628'); g.addColorStop(0.5,'#1a3a2a'); g.addColorStop(1,'#0d1f0f');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.fillStyle='#040e06';
    for(let i=0;i<9;i++){ const tx=i/8*W,th2=H*(0.28+((i*37)%10)*0.025); ctx.beginPath(); ctx.moveTo(tx,H); ctx.lineTo(tx-W*0.07,H-th2); ctx.lineTo(tx+W*0.07,H-th2); ctx.closePath(); ctx.fill(); }
    stars.slice(0,25).forEach(s=>{ const fy=H*0.2+s.y*0.5,tw=Math.sin(t*0.003*s.speed*3+s.twinkle); ctx.beginPath(); ctx.arc(s.x,fy,1.5,0,Math.PI*2); ctx.fillStyle=`rgba(180,255,100,${Math.max(0,tw)*0.75})`; ctx.fill(); });
  } else if(theme==='aurora'){
    ctx.fillStyle='#010a12'; ctx.fillRect(0,0,W,H);
    [['rgba(0,255,150,',0],['rgba(100,50,255,',2],['rgba(0,200,255,',4]].forEach(([col,bi])=>{ for(let x=0;x<=W;x+=2){ const wy=H*0.35+Math.sin(x*0.02+t*0.001+bi)*H*0.1+bi*H*0.03,h2=H*0.12+Math.sin(x*0.03+t*0.0008)*H*0.04,ag=ctx.createLinearGradient(x,wy-h2,x,wy+h2); ag.addColorStop(0,col+'0)'); ag.addColorStop(0.5,col+'0.18)'); ag.addColorStop(1,col+'0)'); ctx.fillStyle=ag; ctx.fillRect(x,wy-h2,2,h2*2); } });
    stars.forEach(s=>{ const tw=Math.sin(t*0.002*s.speed*4+s.twinkle),a=0.2+0.5*((tw+1)/2)*s.bright; ctx.beginPath(); ctx.arc(s.x,s.y*0.4,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill(); });
  } else if(theme==='fire'){
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a0000'); g.addColorStop(0.4,'#3d0000'); g.addColorStop(0.7,'#8b1a00'); g.addColorStop(1,'#ff4500');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    for(let i=0;i<6;i++){ const fx=W*(0.1+i*0.15)+Math.sin(t*0.002+i)*15,fh=H*(0.3+Math.sin(t*0.003+i*1.3)*0.1),fg=ctx.createRadialGradient(fx,H,5,fx,H-fh,fh*0.6); fg.addColorStop(0,'rgba(255,200,0,0.6)'); fg.addColorStop(0.4,'rgba(255,80,0,0.3)'); fg.addColorStop(1,'rgba(255,0,0,0)'); ctx.fillStyle=fg; ctx.fillRect(0,0,W,H); }
  }
}

function buildWords(){
  const txt=document.getElementById('customText').value.trim();
  words=txt.split(/\s+/).filter(Boolean);
  const container=document.getElementById('wordContainer'); container.innerHTML=''; wordEls=[];
  const color=document.getElementById('txtColor').value, fs=document.getElementById('fontSize').value+'px';
  const bold=document.getElementById('boldText').checked, stroke=document.getElementById('strokeText').checked;
  const {r,g,b}=hexToRgb(document.getElementById('shadowColor').value);
  words.forEach(w=>{ const span=document.createElement('span'); span.className='word'; span.textContent=w; span.style.color=color; span.style.fontSize=fs; span.style.fontWeight=bold?'900':'400'; span.style.textShadow=`0 2px 14px rgba(0,0,0,0.9),0 0 22px rgba(${r},${g},${b},0.7)`; if(stroke) span.style.webkitTextStroke=`1px rgba(${r},${g},${b},0.8)`; container.appendChild(span); wordEls.push(span); });
  lastWordIdx=-1;
}

function animateWords(elapsed){
  const n=words.length; if(!n) return;
  const startT=200,endT=6500,interval=(endT-startT)/(n-1||1);
  if(elapsed<startT&&lastWordIdx>=0){ wordEls.forEach(el=>{el.style.opacity='0';el.style.transform='scale(0.6) translateY(18px)';el.style.transition='none';}); lastWordIdx=-1; }
  const targetIdx=Math.min(Math.floor((elapsed-startT)/interval),n-1);
  for(let i=0;i<=targetIdx;i++){
    if(i>lastWordIdx){ const el=wordEls[i]; el.style.transition='none'; el.style.opacity='0'; el.style.transform='scale(0.5) translateY(22px)'; requestAnimationFrame(()=>{ el.style.transition='opacity 0.3s ease,transform 0.38s cubic-bezier(0.34,1.56,0.64,1)'; el.style.opacity='1'; el.style.transform='scale(1) translateY(0)'; }); el.style.filter='brightness(1.7)'; setTimeout(()=>{el.style.filter='brightness(1)';},280); }
  }
  if(targetIdx>=0) lastWordIdx=Math.max(lastWordIdx,targetIdx);
  if(elapsed>6600){ const fa=Math.max(0,1-(elapsed-6600)/300); wordEls.forEach(el=>{el.style.opacity=String(fa);}); }
}

function mainLoop(ts){
  if(!startTime) startTime=ts;
  const elapsed=(ts-startTime)%DURATION;
  const canvas=document.getElementById('bgCanvas'); canvas.width=PW; canvas.height=PH;
  const ctx=canvas.getContext('2d');
  drawBG(ctx,elapsed,settings,PW,PH);
  animateWords(elapsed);
  document.getElementById('progressBar').style.width=((elapsed/DURATION)*100)+'%';
  document.getElementById('timerBadge').textContent=(elapsed/1000).toFixed(1)+'s';
  animFrame=requestAnimationFrame(mainLoop);
}

function applySettings(){
  settings={
    bgType:document.querySelector('.bg-tab.active')?.id.replace('tab-','')||'theme',
    overlayColor:document.getElementById('overlayColor').value,
    overlayOpacity:+document.getElementById('overlayOpacity').value,
    blur:+document.getElementById('bgBlur').value,
    grad1:document.getElementById('grad1').value, grad2:document.getElementById('grad2').value, grad3:document.getElementById('grad3').value,
    gradDir:document.getElementById('gradDir').value,
    solidColor:document.getElementById('solidColor').value,
    theme:document.getElementById('themeSelect').value,
    txtColor:document.getElementById('txtColor').value,
    fontSize:+document.getElementById('fontSize').value,
    bold:document.getElementById('boldText').checked, stroke:document.getElementById('strokeText').checked,
    shadowColor:document.getElementById('shadowColor').value,
  };
  cancelAnimationFrame(animFrame); startTime=null; lastWordIdx=-1;
  buildWords(); animFrame=requestAnimationFrame(mainLoop);
}

// ---- GIF Recording — Pure JS, no Worker needed ----
async function startRecord(){
  const btn=document.getElementById('dlBtn'),status=document.getElementById('dlStatus');
  const wrap=document.getElementById('encodeWrap'),fill=document.getElementById('encodeFill');
  btn.disabled=true; btn.textContent='⏳ Capturing...';
  status.textContent='Frames capture ho rahi hain... thoda wait karo'; wrap.style.display='block'; fill.style.width='0%';
  cancelAnimationFrame(animFrame);

  const GW=540, GH=960, FPS=10, FRAMES=FPS*7;
  const off=document.createElement('canvas'); off.width=GW; off.height=GH;
  const ctx2=off.getContext('2d',{willReadFrequently:true});
  initStars(GW,GH);

  const s={...settings};
  const n=words.length, startT=200, endT=6500, interval=(endT-startT)/(n-1||1);
  const fs=s.fontSize?Math.round(s.fontSize*GH/PH):Math.floor(GH*0.042);
  const {r,g,b}=hexToRgb(s.shadowColor||'#ff6b00');

  const gifFrames=[];

  for(let f=0;f<FRAMES;f++){
    const elapsed=(f/FRAMES)*DURATION;
    ctx2.clearRect(0,0,GW,GH);
    drawBG(ctx2,elapsed,s,GW,GH);

    const targetIdx=Math.min(Math.floor((elapsed-startT)/interval),n-1);
    const visWords=words.slice(0,Math.max(0,targetIdx+1));
    const maxPerLine=3, lines=[];
    for(let i=0;i<visWords.length;i+=maxPerLine) lines.push(visWords.slice(i,i+maxPerLine).join(' '));

    ctx2.textAlign='center'; ctx2.textBaseline='middle';
    ctx2.font=`${s.bold?'900':'400'} ${fs}px 'Noto Sans Devanagari',Arial`;

    const lineH=fs*1.6, totalH=lines.length*lineH, startY=GH/2-totalH/2+lineH/2;
    const fadeAmt=elapsed>6600?Math.max(0,1-(elapsed-6600)/300):1;
    ctx2.globalAlpha=fadeAmt;

    lines.forEach((line,li)=>{
      const y=startY+li*lineH;
      ctx2.shadowColor='rgba(0,0,0,0.9)'; ctx2.shadowBlur=20;
      ctx2.fillStyle='rgba(0,0,0,0.35)'; ctx2.fillText(line,GW/2+2,y+2);
      ctx2.shadowColor=`rgba(${r},${g},${b},0.7)`; ctx2.shadowBlur=20;
      ctx2.fillStyle=s.txtColor||'#FFD700'; ctx2.fillText(line,GW/2,y);
      if(s.stroke){ ctx2.strokeStyle=`rgba(${r},${g},${b},0.8)`; ctx2.lineWidth=2; ctx2.strokeText(line,GW/2,y); }
      ctx2.shadowBlur=0;
    });
    ctx2.globalAlpha=1;
    const {r:tr,g:tg,b:tb}=hexToRgb(s.txtColor||'#FFD700');
    ctx2.fillStyle=`rgba(${tr},${tg},${tb},0.85)`; ctx2.fillRect(0,GH-10,GW*(elapsed/DURATION),10);

    // Extract RGB pixels (skip alpha)
    const imgData=ctx2.getImageData(0,0,GW,GH);
    const rgb=new Uint8Array(GW*GH*3);
    for(let i=0,j=0;i<imgData.data.length;i+=4,j+=3){ rgb[j]=imgData.data[i]; rgb[j+1]=imgData.data[i+1]; rgb[j+2]=imgData.data[i+2]; }
    gifFrames.push({pixels:rgb});

    const capPct=Math.round((f+1)/FRAMES*50);
    fill.style.width=capPct+'%';
    status.textContent=`Frame ${f+1}/${FRAMES} capture ho rahi hai...`;
    if(f%3===0) await new Promise(res=>setTimeout(res,0));
  }

  status.textContent='Encoding GIF... please wait (yeh 30-60 sec le sakta hai)';
  fill.style.width='55%';
  await new Promise(res=>setTimeout(res,50));

  // Encode in chunks to avoid blocking UI
  const gifData=GIFEncoder.encode(gifFrames,GW,GH,Math.round(1000/FPS));
  fill.style.width='100%';

  const blob=new Blob([gifData],{type:'image/gif'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.download='word_by_word_9x16.gif'; a.href=url; a.click();

  btn.disabled=false; btn.textContent='⬇ Download GIF';
  status.textContent='✅ GIF download ho gaya! (540×960, 7 sec, '+Math.round(blob.size/1024)+'KB)';
  initStars(PW,PH);
  applySettings();
}

applySettings();
</script>
