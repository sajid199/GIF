<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life's Book - Poetry Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100%;
            max-width: 1080px;
            max-height: 1920px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        @media (min-width: 768px) {
            .container {
                width: 1080px;
                height: 1920px;
            }
        }

        @media (max-width: 767px) {
            .container {
                width: 100vw;
                height: 100vh;
                aspect-ratio: 9/16;
            }
        }

        .background-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.08) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        .book-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            perspective: 2000px;
        }

        .book {
            width: clamp(200px, 40vw, 400px);
            height: clamp(250px, 50vw, 500px);
            position: relative;
            transform-style: preserve-3d;
            animation: floatBook 6s ease-in-out infinite;
        }

        @keyframes floatBook {
            0%, 100% { transform: translateY(0px) rotateY(-15deg); }
            50% { transform: translateY(-20px) rotateY(-15deg); }
        }

        .book-cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #8B4513 0%, #654321 100%);
            border-radius: 0 15px 15px 0;
            box-shadow: 
                -5px 5px 20px rgba(0,0,0,0.3),
                inset 2px 2px 5px rgba(255,255,255,0.2);
            transform: rotateY(-20deg);
            transform-origin: left;
            animation: coverOpen 4s ease-in-out infinite;
        }

        @keyframes coverOpen {
            0%, 100% { transform: rotateY(-20deg); }
            50% { transform: rotateY(-35deg); }
        }

        .pages {
            position: absolute;
            top: 10px;
            left: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            background: #f4f1e8;
            border-radius: 0 10px 10px 0;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #f9f6f0;
            transform-origin: left;
            animation: pageFlip 3s ease-in-out infinite;
            opacity: 0.9;
        }

        .page:nth-child(1) { animation-delay: 0s; z-index: 3; }
        .page:nth-child(2) { animation-delay: 0.3s; z-index: 2; }
        .page:nth-child(3) { animation-delay: 0.6s; z-index: 1; }

        @keyframes pageFlip {
            0%, 80%, 100% { transform: rotateY(0deg); }
            40% { transform: rotateY(-180deg); }
        }

        .wind-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 20px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: windFlow 4s linear infinite;
        }

        @keyframes windFlow {
            0% {
                transform: translateX(-100px) translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateX(calc(100vw + 100px)) translateY(-300px) rotate(360deg);
                opacity: 0;
            }
        }

        .particle:nth-child(1) { top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 35%; animation-delay: 0.5s; }
        .particle:nth-child(3) { top: 50%; animation-delay: 1s; }
        .particle:nth-child(4) { top: 65%; animation-delay: 1.5s; }
        .particle:nth-child(5) { top: 80%; animation-delay: 2s; }
        .particle:nth-child(6) { top: 25%; animation-delay: 2.5s; }
        .particle:nth-child(7) { top: 45%; animation-delay: 3s; }
        .particle:nth-child(8) { top: 70%; animation-delay: 3.5s; }

        .text-content {
            position: absolute;
            width: 90%;
            left: 5%;
            top: 15%;
            z-index: 10;
            text-align: center;
            transition: all 0.3s ease;
            cursor: move;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .text-content.dragging {
            transition: none;
        }

        .hindi-text {
            font-size: clamp(20px, 4.5vw, 48px);
            line-height: 1.8;
            color: #ffffff;
            text-shadow: 
                3px 3px 6px rgba(0,0,0,0.4),
                0 0 20px rgba(255,255,255,0.3);
            margin-bottom: clamp(30px, 6vw, 60px);
            font-weight: 600;
            animation: textGlow 3s ease-in-out infinite;
            padding: 0 clamp(15px, 3vw, 30px);
        }

        .english-text {
            font-size: clamp(16px, 3.5vw, 36px);
            line-height: 1.7;
            color: #f0e6ff;
            text-shadow: 
                2px 2px 4px rgba(0,0,0,0.3),
                0 0 15px rgba(255,255,255,0.2);
            font-style: italic;
            animation: textGlow 3s ease-in-out infinite 0.5s;
            padding: 0 clamp(15px, 3vw, 30px);
        }

        @keyframes textGlow {
            0%, 100% { 
                text-shadow: 
                    3px 3px 6px rgba(0,0,0,0.4),
                    0 0 20px rgba(255,255,255,0.3);
            }
            50% { 
                text-shadow: 
                    3px 3px 8px rgba(0,0,0,0.5),
                    0 0 30px rgba(255,255,255,0.5),
                    0 0 40px rgba(255,255,255,0.3);
            }
        }

        .decorative-line {
            width: clamp(100px, 20vw, 200px);
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            margin: clamp(20px, 4vw, 40px) auto;
            animation: lineGlow 2s ease-in-out infinite;
        }

        @keyframes lineGlow {
            0%, 100% { opacity: 0.5; transform: scaleX(1); }
            50% { opacity: 1; transform: scaleX(1.2); }
        }

        .bottom-decoration {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
        }

        .quote-symbol {
            font-size: clamp(40px, 8vw, 80px);
            color: rgba(255,255,255,0.3);
            animation: symbolRotate 10s linear infinite;
        }

        @keyframes symbolRotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            width: clamp(2px, 0.4vw, 4px);
            height: clamp(2px, 0.4vw, 4px);
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .star:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
        .star:nth-child(2) { top: 25%; left: 85%; animation-delay: 0.5s; }
        .star:nth-child(3) { top: 40%; left: 10%; animation-delay: 1s; }
        .star:nth-child(4) { top: 60%; left: 90%; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 75%; left: 20%; animation-delay: 2s; }
        .star:nth-child(6) { top: 85%; left: 80%; animation-delay: 2.5s; }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: clamp(10px, 2vw, 20px);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        @media (max-width: 767px) {
            .controls {
                bottom: 10px;
                right: 10px;
                padding: 12px;
            }
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            color: white;
            width: clamp(40px, 8vw, 50px);
            height: clamp(40px, 8vw, 50px);
            margin: clamp(3px, 0.5vw, 5px);
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(16px, 3vw, 20px);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        .control-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.5);
        }

        .control-row {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-label {
            color: white;
            text-align: center;
            margin-bottom: clamp(5px, 1vw, 10px);
            font-size: clamp(11px, 2vw, 14px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .reset-btn {
            background: rgba(255,100,100,0.3);
            border: 2px solid rgba(255,100,100,0.6);
            color: white;
            padding: clamp(8px, 1.5vw, 10px) clamp(15px, 3vw, 20px);
            border-radius: 10px;
            cursor: pointer;
            margin-top: clamp(5px, 1vw, 10px);
            width: 100%;
            transition: all 0.3s;
            font-size: clamp(11px, 2vw, 14px);
            touch-action: manipulation;
        }

        .reset-btn:hover {
            background: rgba(255,100,100,0.5);
        }

        .reset-btn:active {
            background: rgba(255,100,100,0.6);
            transform: scale(0.98);
        }

        /* Mobile landscape optimization */
        @media (max-width: 767px) and (orientation: landscape) {
            .controls {
                bottom: 5px;
                right: 5px;
                padding: 8px;
            }
            
            .control-btn {
                width: 35px;
                height: 35px;
                margin: 2px;
                font-size: 14px;
            }
            
            .control-label {
                font-size: 10px;
                margin-bottom: 3px;
            }
            
            .reset-btn {
                padding: 6px 12px;
                font-size: 10px;
                margin-top: 3px;
            }
        }

        /* Prevent text selection during drag */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="background-animation"></div>
            
            <div class="stars">
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
            </div>

            <div class="wind-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>

            <div class="controls">
                <div class="control-label">Move Text</div>
                <div class="control-row">
                    <button class="control-btn" id="up">▲</button>
                </div>
                <div class="control-row">
                    <button class="control-btn" id="left">◄</button>
                    <button class="control-btn" id="down">▼</button>
                    <button class="control-btn" id="right">►</button>
                </div>
                <button class="reset-btn" id="reset">Reset</button>
            </div>

            <div class="text-content" id="textContent">
                <div class="hindi-text">
                    यूँ ना छोड़ ज़िंदगी की किताब को खुला,<br>
                    बेवक्त की हवा ना जाने कौन सा पन्ना पलट दे।
                </div>
                
                <div class="decorative-line"></div>
                
                <div class="english-text">
                    Don't leave the book of life open like this,<br>
                    The untimely wind may turn any page.
                </div>
            </div>

            <div class="book-container">
                <div class="book">
                    <div class="book-cover"></div>
                    <div class="pages">
                        <div class="page"></div>
                        <div class="page"></div>
                        <div class="page"></div>
                    </div>
                </div>
            </div>

            <div class="bottom-decoration">
                <div class="quote-symbol">❝</div>
            </div>
        </div>
    </div>

    <script>
        const textContent = document.getElementById('textContent');
        const upBtn = document.getElementById('up');
        const downBtn = document.getElementById('down');
        const leftBtn = document.getElementById('left');
        const rightBtn = document.getElementById('right');
        const resetBtn = document.getElementById('reset');

        let currentX = 5; // percentage
        let currentY = 15; // percentage
        
        // Adjust step size based on screen size
        const getStep = () => {
            return window.innerWidth < 768 ? 3 : 2;
        };

        // Initial position
        const initialX = 5;
        const initialY = 15;

        function updatePosition() {
            textContent.style.left = currentX + '%';
            textContent.style.top = currentY + '%';
        }

        // Button controls
        upBtn.addEventListener('click', (e) => {
            e.preventDefault();
            currentY = Math.max(0, currentY - getStep());
            updatePosition();
        });

        downBtn.addEventListener('click', (e) => {
            e.preventDefault();
            currentY = Math.min(90, currentY + getStep());
            updatePosition();
        });

        leftBtn.addEventListener('click', (e) => {
            e.preventDefault();
            currentX = Math.max(0, currentX - getStep());
            updatePosition();
        });

        rightBtn.addEventListener('click', (e) => {
            e.preventDefault();
            currentX = Math.min(90, currentX + getStep());
            updatePosition();
        });

        resetBtn.addEventListener('click', (e) => {
            e.preventDefault();
            currentX = initialX;
            currentY = initialY;
            updatePosition();
        });

        // Drag and drop functionality
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        // Mouse events
        textContent.addEventListener('mousedown', (e) => {
            isDragging = true;
            textContent.classList.add('dragging', 'no-select');
            startX = e.clientX;
            startY = e.clientY;
            
            const rect = textContent.getBoundingClientRect();
            const container = textContent.parentElement.getBoundingClientRect();
            initialLeft = ((rect.left - container.left) / container.width) * 100;
            initialTop = ((rect.top - container.top) / container.height) * 100;
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const container = textContent.parentElement.getBoundingClientRect();
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            
            const deltaXPercent = (deltaX / container.width) * 100;
            const deltaYPercent = (deltaY / container.height) * 100;
            
            currentX = Math.max(0, Math.min(90, initialLeft + deltaXPercent));
            currentY = Math.max(0, Math.min(90, initialTop + deltaYPercent));
            
            updatePosition();
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                textContent.classList.remove('dragging', 'no-select');
            }
        });

        // Touch events for mobile
        textContent.addEventListener('touchstart', (e) => {
            isDragging = true;
            textContent.classList.add('dragging', 'no-select');
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            
            const rect = textContent.getBoundingClientRect();
            const container = textContent.parentElement.getBoundingClientRect();
            initialLeft = ((rect.left - container.left) / container.width) * 100;
            initialTop = ((rect.top - container.top) / container.height) * 100;
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            
            const touch = e.touches[0];
            const container = textContent.parentElement.getBoundingClientRect();
            const deltaX = touch.clientX - startX;
            const deltaY = touch.clientY - startY;
            
            const deltaXPercent = (deltaX / container.width) * 100;
            const deltaYPercent = (deltaY / container.height) * 100;
            
            currentX = Math.max(0, Math.min(90, initialLeft + deltaXPercent));
            currentY = Math.max(0, Math.min(90, initialTop + deltaYPercent));
            
            updatePosition();
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', () => {
            if (isDragging) {
                isDragging = false;
                textContent.classList.remove('dragging', 'no-select');
            }
        });

        // Keyboard controls (desktop only)
        document.addEventListener('keydown', (e) => {
            if (window.innerWidth < 768) return; // Skip on mobile
            
            switch(e.key) {
                case 'ArrowUp':
                    currentY = Math.max(0, currentY - getStep());
                    updatePosition();
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    currentY = Math.min(90, currentY + getStep());
                    updatePosition();
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    currentX = Math.max(0, currentX - getStep());
                    updatePosition();
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    currentX = Math.min(90, currentX + getStep());
                    updatePosition();
                    e.preventDefault();
                    break;
            }
        });

        // Prevent bounce/overscroll on iOS
        document.body.addEventListener('touchmove', (e) => {
            if (isDragging) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
